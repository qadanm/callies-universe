<!-- @dsCard group="Colors" viewport="700x150" name="Sticker-set + clash accents" subtitle="DECORATION LAYER ONLY — never carries text contrast" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body)}
  .row{display:flex;gap:12px;padding:24px;flex-wrap:wrap}
  .sw{width:84px;height:84px;border-radius:var(--radius-md);box-shadow:var(--shadow-sticker);display:flex;align-items:flex-end;padding:8px;font:var(--type-legal);font-weight:700;color:var(--ink)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--sticker-yellow)">yellow</div>
  <div class="sw" style="background:var(--sticker-lime)">lime</div>
  <div class="sw" style="background:var(--sticker-cyan)">cyan</div>
  <div class="sw" style="background:var(--sticker-pink);color:#fff">pink</div>
  <div class="sw" style="background:var(--sticker-purple);color:#fff">purple</div>
  <div class="sw" style="background:var(--sticker-sky);color:#fff">sky</div>
  <div class="sw" style="background:var(--pop-cyan)">pop-cyan</div>
  <div class="sw" style="background:var(--pop-pink);color:#fff">pop-pink</div>
</div>
</body></html>

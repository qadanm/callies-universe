<!-- @dsCard group="Colors" viewport="700x150" name="Foundation — canvas, surfaces & ink" subtitle="Bright warm base, never dark mode. ink 16.8:1 on canvas ✓" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body)}
  .row{display:flex;gap:0;padding:20px;height:110px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:var(--type-cap);font-weight:700;border-right:1px solid var(--hairline)}
  .sw small{font-weight:500;opacity:.7;font-size:11px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--canvas);color:var(--ink)">canvas<small>#FFF7F0</small></div>
  <div class="sw" style="background:var(--canvas-sink);color:var(--ink)">canvas-sink<small>#FDEDE0</small></div>
  <div class="sw" style="background:var(--surface);color:var(--ink)">surface<small>#FFFFFF</small></div>
  <div class="sw" style="background:var(--ink);color:var(--canvas)">ink<small>#221403</small></div>
  <div class="sw" style="background:var(--ink-soft);color:#fff">ink-soft<small>#5C4631</small></div>
  <div class="sw" style="background:var(--ink-faint);color:#fff">ink-faint<small>#8A7256</small></div>
</div>
</body></html>

<!-- @dsCard group="Brand" viewport="700x200" name="The one rule — maximalist skin, clean bones" subtitle="Chaos lives only in the decoration layer; bones stay AA-legible" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body);color:var(--ink)}
  .wrap{padding:22px;display:flex;gap:18px;align-items:stretch}
  .card{position:relative;flex:1;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--gloss-card);padding:20px;overflow:visible}
  h3{font:var(--type-d4);margin:0 0 6px}
  p{font:var(--type-sm);color:var(--text-muted);margin:0}
  .stk{position:absolute;border-radius:8px;box-shadow:var(--shadow-sticker);font:var(--type-legal);font-weight:800;display:flex;align-items:center;justify-content:center;color:var(--ink)}
  .quote{flex:1;background:var(--ink);color:var(--canvas);border-radius:var(--radius-lg);padding:22px;display:flex;align-items:center;font:var(--type-d4);line-height:1.2}
  .quote b{color:var(--flame-500)}
</style></head><body>
<div class="wrap">
  <div class="card">
    <span class="stk" style="background:var(--sticker-yellow);width:40px;height:40px;top:-14px;right:-10px;transform:rotate(10deg)">★</span>
    <span class="stk" style="background:var(--pop-cyan);width:34px;height:34px;bottom:-12px;left:-8px;transform:rotate(-12deg)">✦</span>
    <h3>Clean bones</h3>
    <p>Buttons, inputs, the core flow, and all text stay obvious and WCAG-AA legible. Stickers attach to corners — never over a tap target or a label.</p>
  </div>
  <div class="quote">Maximalist <b>skin,</b> clean <b>bones.</b></div>
</div>
</body></html>

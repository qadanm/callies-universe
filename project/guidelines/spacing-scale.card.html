<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 4px base" subtitle="Generous, chunky rhythm" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body);color:var(--ink)}
  .wrap{padding:24px;display:flex;align-items:flex-end;gap:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--ember-600);border-radius:4px;width:22px}
  .t{font:var(--type-legal);color:var(--text-muted)}
</style></head><body>
<div class="wrap">
  <div class="item"><div class="bar" style="height:4px"></div><span class="t">1·4</span></div>
  <div class="item"><div class="bar" style="height:8px"></div><span class="t">2·8</span></div>
  <div class="item"><div class="bar" style="height:12px"></div><span class="t">3·12</span></div>
  <div class="item"><div class="bar" style="height:16px"></div><span class="t">4·16</span></div>
  <div class="item"><div class="bar" style="height:24px"></div><span class="t">6·24</span></div>
  <div class="item"><div class="bar" style="height:32px"></div><span class="t">7·32</span></div>
  <div class="item"><div class="bar" style="height:48px"></div><span class="t">9·48</span></div>
  <div class="item"><div class="bar" style="height:64px"></div><span class="t">10·64</span></div>
  <div class="item"><div class="bar" style="height:80px"></div><span class="t">11·80</span></div>
</div>
</body></html>

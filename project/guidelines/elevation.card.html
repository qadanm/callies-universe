<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation — glossy, not flat" subtitle="Warm-tinted shadow ramp + the inflatable gloss" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body);color:var(--ink)}
  .wrap{padding:26px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .box{width:90px;height:64px;background:var(--surface);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font:var(--type-cap);color:var(--text-muted)}
  .cta{width:110px;height:64px;border-radius:var(--radius-pill);background:linear-gradient(180deg,var(--ember-500),var(--ember-600));color:#fff;display:flex;align-items:center;justify-content:center;font:var(--type-button);font-size:16px}
</style></head><body>
<div class="wrap">
  <div class="box" style="box-shadow:var(--elev-1)">elev-1</div>
  <div class="box" style="box-shadow:var(--elev-2)">elev-2</div>
  <div class="box" style="box-shadow:var(--elev-3)">elev-3</div>
  <div class="box" style="box-shadow:var(--gloss-card)">gloss-card</div>
  <div class="cta" style="box-shadow:var(--gloss-primary)">gloss CTA</div>
</div>
</body></html>

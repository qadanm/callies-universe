<!-- @dsCard group="Brand" viewport="700x180" name="Logo lockup" subtitle="Glossy flame mark + chunky display wordmark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body);color:var(--ink)}
  .wrap{padding:28px;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
  .lock{display:flex;align-items:center;gap:14px}
  .lock img{width:64px;height:64px}
  .word{font:var(--type-d2);font-size:34px;letter-spacing:-0.02em}
  .word .my{color:var(--ember-600)}
  .onink{background:var(--ink);border-radius:var(--radius-lg);padding:18px 22px;display:flex;align-items:center;gap:14px}
  .onink .word{color:var(--canvas)}
  .onink img{width:52px;height:52px}
</style></head><body>
<div class="wrap">
  <div class="lock"><img src="../assets/flame-mark.svg" alt="RoastMyRide flame mark"/><span class="word">Roast<span class="my">My</span>Ride</span></div>
  <div class="onink"><img src="../assets/flame-mark.svg" alt=""/><span class="word">Roast<span class="my" style="color:var(--flame-500)">My</span>Ride</span></div>
</div>
</body></html>

<!-- @dsCard group="Spacing" viewport="700x170" name="Radius — chunky & squishy" subtitle="Inflatable language: generous rounding, pill controls" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body);color:var(--ink)}
  .wrap{padding:22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .box{width:74px;height:74px;background:var(--surface);box-shadow:var(--gloss-card);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font:var(--type-legal);color:var(--text-muted)}
</style></head><body>
<div class="wrap">
  <div class="box" style="border-radius:var(--radius-sm)">12 sm</div>
  <div class="box" style="border-radius:var(--radius-md)">18 md</div>
  <div class="box" style="border-radius:var(--radius-lg)">26 lg</div>
  <div class="box" style="border-radius:var(--radius-xl)">34 xl</div>
  <div class="box" style="border-radius:var(--radius-2xl)">44 2xl</div>
  <div class="box" style="border-radius:var(--radius-pill)">pill</div>
  <div class="box" style="border-radius:var(--radius-blob);background:var(--heat-400)">blob</div>
</div>
</body></html>

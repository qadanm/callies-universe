<!-- @dsCard group="Colors" viewport="700x170" name="Calico base — Callie's coat" subtitle="The shared brand neutrals: cream + ginger + charcoal (constant across apps)" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body)}
  .row{display:flex;gap:0;padding:20px;height:110px}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:var(--type-cap);font-weight:700;border-right:1px solid rgba(0,0,0,0.06)}
  .sw small{font-weight:500;opacity:.8;font-size:11px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--cream);color:var(--ink)">cream<small>#FFF6EC · canvas</small></div>
  <div class="sw" style="background:var(--cream-200);color:var(--ink)">cream-200<small>#FBEEDF</small></div>
  <div class="sw" style="background:var(--ginger-500);color:#fff">ginger-500<small>#D9772E</small></div>
  <div class="sw" style="background:var(--ginger-600);color:#fff">ginger-600<small>#B4561C</small></div>
  <div class="sw" style="background:var(--charcoal-700);color:#fff">charcoal-700<small>#4A413A</small></div>
  <div class="sw" style="background:var(--charcoal-900);color:var(--cream)">charcoal-900<small>#2A2420 · ink</small></div>
</div>
</body></html>

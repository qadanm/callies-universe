<!-- @dsCard group="Type" viewport="700x300" name="Display scale — Baloo 2" subtitle="Chunky, confident, oversized up top. Never below ~18px." -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-body);color:var(--ink)}
  .wrap{padding:22px;display:flex;flex-direction:column;gap:4px}
  .l{font:var(--type-cap);color:var(--text-hint);margin-bottom:-2px}
  .reveal{font:var(--type-reveal)}
  .d1{font:var(--type-d1)}
  .d2{font:var(--type-d2)}
  .d3{font:var(--type-d3)}
  .d4{font:var(--type-d4)}
</style></head><body>
<div class="wrap">
  <span class="l">reveal · 72/heavy</span><div class="reveal">Cooked.</div>
  <span class="l">d1 · 52/heavy</span><div class="d1">Roast my car</div>
  <span class="l">d2 · 40/heavy</span><div class="d2">Pick your roaster</div>
  <span class="l">d3 · 30/700</span><div class="d3">Cooking your roast…</div>
  <span class="l">d4 · 22/700</span><div class="d4">Tap a few stickers</div>
</div>
</body></html>

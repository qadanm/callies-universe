<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>

  .wrap{padding:26px;max-width:560px}
  h1{font:var(--type-d1);margin:0 0 8px}

</style></head><body>
<div class="wrap">
  <h1>Your car. <mark>Cooked.</mark></h1>

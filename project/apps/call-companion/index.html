<!-- @dsCard group="Call Companion" viewport="430x880" name="Call Companion — incoming call" subtitle="Second app, same core, cool accent — a character calls; Callie reacts" -->
<!-- @startingPoint section="Call Companion" subtitle="Incoming-call hero screen" viewport="430x880" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Call Companion — Incoming Call</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="theme.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { background: #1C2340; font-family: var(--font-body); display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 22px 12px; box-sizing: border-box; min-height: 100%; }
  .tag { font: var(--type-cap); font-weight: 700; color: #C3CBFF; letter-spacing: 0.06em; text-transform: uppercase; }
  .phone { width: 390px; height: 844px; border-radius: 54px; background: #0F1330; padding: 12px; box-shadow: 0 30px 70px rgba(0,0,0,0.55); flex-shrink: 0; }
  .screen { position: relative; width: 100%; height: 100%; border-radius: 44px; overflow: hidden; display: flex; flex-direction: column;
            background: radial-gradient(130% 70% at 50% 0%, var(--accent-500) 0%, var(--accent-700) 60%, #1A1F45 100%); }
  .notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #0F1330; border-radius: 0 0 18px 18px; z-index: 80; }
  @keyframes ring-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes ring-halo { 0% { transform: scale(0.9); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
</style>
</head>
<body>
<div class="tag">Callie's Universe · Call Companion</div>
<div class="phone"><div class="screen" id="screen"><div class="notch"></div></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Roaster, CallieHost } = window.RoastMyRideDesignSystem_896616;
const CALLER = Roaster.roster.find(r => r.id === "abuomar");

function IncomingCall() {
  const [state, setState] = React.useState("ringing"); // ringing | answered | declined
  if (state === "answered") return <OnCall />;
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", color: "#fff", padding: "64px 24px 36px" }}>
      <div style={{ font: "var(--type-cap)", letterSpacing: "0.1em", textTransform: "uppercase", opacity: 0.85 }}>Incoming call · Callie's Universe</div>
      {/* caller with pulsing halo */}
      <div style={{ position: "relative", marginTop: 36, marginBottom: 20 }}>
        <div style={{ position: "absolute", inset: -10, borderRadius: "50%", background: "rgba(255,255,255,0.25)", animation: "ring-halo 1.8s ease-out infinite" }} />
        <div style={{ position: "relative", animation: "ring-pulse 1.6s var(--ease-out) infinite", borderRadius: "50%", boxShadow: "0 12px 30px rgba(0,0,0,0.35)" }}>
          <Roaster id={CALLER.id} size={180} ring />
        </div>
      </div>
      <h1 style={{ font: "var(--type-d1)", fontSize: 40, margin: "4px 0 4px", textAlign: "center" }}>{CALLER.name.split(" ")[0]} {CALLER.name.split(" ")[1] || ""}</h1>
      <div style={{ font: "var(--type-lead)", opacity: 0.9 }}>{CALLER.tag} · mobile</div>

      {/* Callie reacting to the call */}
      <div style={{ marginTop: "auto", display: "flex", alignItems: "center", gap: 10, background: "rgba(255,255,255,0.12)", borderRadius: "var(--radius-pill)", padding: "6px 14px 6px 6px" }}>
        <CallieHost context="call" size={48} />
        <span style={{ font: "var(--type-sm)", fontWeight: 600 }}>Callie thinks you should pick up 🐾</span>
      </div>

      {/* answer / decline */}
      <div style={{ display: "flex", justifyContent: "space-around", width: "100%", marginTop: 28 }}>
        <CallBtn color="var(--danger)" label="Decline" icon="✕" onClick={() => setState("declined")} dim={state === "declined"} />
        <CallBtn color="var(--success)" label="Answer" icon="📞" onClick={() => setState("answered")} />
      </div>
      {state === "declined" && <div style={{ marginTop: 16, font: "var(--type-sm)", opacity: 0.85 }}>Declined — they'll try again later.</div>}
    </div>
  );
}
function CallBtn({ color, label, icon, onClick, dim }) {
  return (
    <button onClick={onClick} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, background: "none", border: "none", cursor: "pointer", opacity: dim ? 0.5 : 1 }}>
      <span style={{ width: 72, height: 72, borderRadius: "50%", background: color, color: "#fff", fontSize: 30, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "var(--elev-3)" }}>{icon}</span>
      <span style={{ font: "var(--type-cap)", fontWeight: 700, color: "#fff" }}>{label}</span>
    </button>
  );
}
function OnCall() {
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 18, color: "#fff", padding: 24, textAlign: "center" }}>
      <Roaster id={CALLER.id} size={150} ring />
      <h1 style={{ font: "var(--type-d2)", fontSize: 34, margin: 0 }}>On call with {CALLER.name.split(" ")[0]}</h1>
      <div style={{ font: "var(--type-lead)", opacity: 0.9 }}>00:04</div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(255,255,255,0.12)", borderRadius: "var(--radius-pill)", padding: "6px 14px 6px 6px", marginTop: 8 }}>
        <CallieHost context="celebrate" size={48} />
        <span style={{ font: "var(--type-sm)", fontWeight: 600 }}>Callie's delighted you answered 🎉</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("screen")).render(<IncomingCall />);
</script>
</body>
</html>

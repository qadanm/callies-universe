<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-body); color: var(--ink); }
  .grid { padding: 18px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 8px; background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--gloss-card); }
  .cell b { font: var(--type-d4); font-size: 14px; color: var(--ink); text-align: center; line-height: 1.1; }
  .cell span { font: var(--type-legal); color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
<div id="root" class="grid"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Roaster } = window.RoastMyRideDesignSystem_896616;
  function Demo() {
    return (<>
      {Roaster.roster.map(r => (
        <div className="cell" key={r.id}>
          <Roaster id={r.id} size={110} ring />
          <b>{r.name}</b>
          <span>{r.tag}</span>
        </div>
      ))}
    </>);
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--canvas); font-family: var(--font-body); color: var(--ink); }
  .wrap { padding: 22px; display: flex; gap: 18px; align-items: stretch; }
  .lab { font: var(--type-cap); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .phone { position: relative; width: 240px; height: 360px; background: var(--canvas-sink); border-radius: 28px; overflow: hidden; box-shadow: var(--elev-2); }
  .col { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Sheet, Toast, Confetti, Button, Mascot } = window.RoastMyRideDesignSystem_896616;
  function Demo() {
    return (
      <>
        <div>
          <div className="lab">Bouncy sheet + confetti</div>
          <div className="phone">
            <Confetti count={22} />
            <Sheet open title="Roast incoming 🔥" header={<Mascot state="celebrating" size={84} />}
              primaryAction={<Button block>Share it</Button>}>
              <p style={{textAlign:"center", margin:0}}>Your video is ready. One tap to post.</p>
            </Sheet>
          </div>
        </div>
        <div className="col">
          <div className="lab">Toasts</div>
          <Toast tone="success">Saved to Camera Roll</Toast>
          <Toast tone="ink">Copied share link</Toast>
          <Toast tone="danger">Couldn't cook that — retry</Toast>
          <Toast tone="flame">+5 roasts added</Toast>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

name: Deploy

# Skeleton — manual trigger, gated on secrets being present. Wire your host's
# secrets (see DEPLOY.md, added with the container/deploy config) then enable the
# commented steps. Kept manual so it never runs (or fails) without configuration.
on:
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    # Only runs when a deploy token is configured (otherwise a no-op).
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      # Example (Fly.io) — uncomment + set FLY_API_TOKEN once services/api/Dockerfile lands (S3-9):
      # - uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --remote-only
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: echo "Configure DEPLOY_ENABLED + host secrets (see DEPLOY.md) to enable deploy."

  deploy-web:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      # The web app is a static Vite build; deploy dist/ to Vercel/Netlify/Pages.
      # - uses: pnpm/action-setup@v4
      #   with: { version: 10 }
      # - uses: actions/setup-node@v4
      #   with: { node-version: 20, cache: pnpm }
      # - run: pnpm install --frozen-lockfile
      # - run: VITE_ROAST_API=${{ vars.ROAST_API_URL }} pnpm --filter @callies-universe/roastmyride-app build
      # - run: npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }}
      - run: echo "Configure DEPLOY_ENABLED + host secrets (see DEPLOY.md) to enable deploy."
